# local profile: targets the docker compose services on localhost, with chattier logging
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/flightpulse
    username: flightpulse
    password: flightpulse
  jpa:
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.minhaz.flightpulse: DEBUG
    org.flywaydb: INFO
